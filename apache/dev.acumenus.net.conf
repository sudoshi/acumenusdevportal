<VirtualHost *:80>
    ServerName dev.acumenus.net
    ServerAdmin webmaster@dev.acumenus.net

    DocumentRoot /home/smudoshi/Github/dev.acumenus.net/public

    <Directory /home/smudoshi/Github/dev.acumenus.net/public>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        DirectoryIndex index.html
        Require all granted
    </Directory>

    RedirectMatch 301 ^/graphify$ /graphify/
    RedirectMatch 301 ^/screenshots$ /screenshots/
    RedirectMatch 301 ^/schemaspy$ /schemaspy/

    AddType text/markdown .md
    AddType application/graphml+xml .graphml

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
    Header always set X-Robots-Tag "noindex, nofollow"

    ErrorLog ${APACHE_LOG_DIR}/dev.acumenus.net-error.log
    CustomLog ${APACHE_LOG_DIR}/dev.acumenus.net-access.log combined

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =dev.acumenus.net
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
